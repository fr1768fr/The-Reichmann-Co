<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#1e293b"/>
            <stop offset="1" stop-color="#0a0f1c"/>
        </linearGradient>
        <radialGradient id="glow1" cx="180" cy="120" r="500" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#3b82f6" stop-opacity="0.28"/>
            <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="1050" cy="540" r="500" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="textGrad" x1="400" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#60a5fa"/>
            <stop offset="0.5" stop-color="#3b82f6"/>
            <stop offset="1" stop-color="#0ea5e9"/>
        </linearGradient>
        <linearGradient id="atomBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#1e293b"/>
            <stop offset="1" stop-color="#0a0f1c"/>
        </linearGradient>
        <radialGradient id="atomNucleus" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#bfdbfe"/>
            <stop offset="0.55" stop-color="#60a5fa"/>
            <stop offset="1" stop-color="#2563eb"/>
        </radialGradient>
        <linearGradient id="atomOrbit" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#60a5fa"/>
            <stop offset="1" stop-color="#3b82f6"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow1)"/>
    <rect width="1200" height="630" fill="url(#glow2)"/>

    <!-- Subtle grid -->
    <g stroke="#60a5fa" stroke-opacity="0.06" stroke-width="1">
        <line x1="0" y1="105" x2="1200" y2="105"/>
        <line x1="0" y1="210" x2="1200" y2="210"/>
        <line x1="0" y1="315" x2="1200" y2="315"/>
        <line x1="0" y1="420" x2="1200" y2="420"/>
        <line x1="0" y1="525" x2="1200" y2="525"/>
        <line x1="200" y1="0" x2="200" y2="630"/>
        <line x1="400" y1="0" x2="400" y2="630"/>
        <line x1="600" y1="0" x2="600" y2="630"/>
        <line x1="800" y1="0" x2="800" y2="630"/>
        <line x1="1000" y1="0" x2="1000" y2="630"/>
    </g>

    <!-- Atomic logo at left, 240px size, position (100, 195) -->
    <g transform="translate(100, 195)">
        <rect width="240" height="240" rx="52" fill="url(#atomBg)"/>
        <rect x="2" y="2" width="236" height="236" rx="50" fill="none" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="1"/>
        <g transform="scale(3.75)">
            <g stroke="url(#atomOrbit)" stroke-width="0.5" fill="none">
                <ellipse cx="32" cy="32" rx="22" ry="9"/>
                <ellipse cx="32" cy="32" rx="22" ry="9" transform="rotate(60 32 32)"/>
                <ellipse cx="32" cy="32" rx="22" ry="9" transform="rotate(120 32 32)"/>
            </g>
            <circle cx="54" cy="32" r="2.5" fill="#93c5fd"/>
            <circle cx="21" cy="13" r="2.5" fill="#93c5fd"/>
            <circle cx="21" cy="51" r="2.5" fill="#93c5fd"/>
            <circle cx="32" cy="32" r="5" fill="url(#atomNucleus)"/>
        </g>
    </g>

    <!-- Eyebrow pill -->
    <g transform="translate(400, 215)">
        <rect x="0" y="0" rx="100" ry="100" width="290" height="38" fill="#3b82f6" fill-opacity="0.1" stroke="#60a5fa" stroke-opacity="0.4" stroke-width="1"/>
        <text x="20" y="25" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#60a5fa" letter-spacing="2.5">SOUTH AFRICAN TECHNOLOGY COMPANY</text>
    </g>

    <!-- Company name -->
    <text x="400" y="335" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#f8fafc" letter-spacing="-2">Reichmann Holdings</text>

    <!-- Divider -->
    <rect x="400" y="365" width="80" height="2" fill="url(#textGrad)"/>

    <!-- Tagline -->
    <text x="400" y="425" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="500" fill="url(#textGrad)" letter-spacing="-0.5">Software, Apps &amp; SaaS</text>

    <!-- Description -->
    <text x="400" y="475" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="-0.2">Engineered for every screen.</text>

    <!-- URL -->
    <text x="400" y="555" font-family="'Consolas', 'Menlo', monospace" font-size="18" font-weight="500" fill="#64748b" letter-spacing="1.5">reichmannholdings.co.za</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#0a0a0a"/>
            <stop offset="1" stop-color="#000000"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Subtle hairline border -->
    <rect x="40" y="40" width="1120" height="550" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Logo monogram (left) -->
    <g transform="translate(100, 195)">
        <rect width="240" height="240" rx="6" fill="#0a0a0a"/>
        <rect x="2" y="2" width="236" height="236" rx="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <text x="120" y="158" text-anchor="middle"
              font-family="'Playfair Display', 'Cormorant Garamond', Georgia, serif"
              font-weight="700"
              font-size="135"
              fill="#f5f5f5">R</text>
        <line x1="80" y1="180" x2="160" y2="180" stroke="rgba(201, 166, 117, 0.85)" stroke-width="1.5"/>
        <text x="120" y="210" text-anchor="middle"
              font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
              font-weight="500"
              font-size="22"
              letter-spacing="12"
              fill="rgba(245, 245, 245, 0.78)">CO</text>
    </g>

    <!-- Eyebrow line + label -->
    <g transform="translate(400, 230)">
        <line x1="0" y1="9" x2="40" y2="9" stroke="rgba(201, 166, 117, 0.85)" stroke-width="1"/>
        <text x="56" y="14"
              font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
              font-size="14"
              font-weight="500"
              letter-spacing="4"
              fill="rgba(201, 166, 117, 0.95)">ESTABLISHED 2026</text>
    </g>

    <!-- Company name in serif -->
    <text x="400" y="320"
          font-family="'Playfair Display', 'Cormorant Garamond', Georgia, serif"
          font-size="72"
          font-weight="700"
          fill="#f5f5f5"
          letter-spacing="-1.5">The Reichmann Co.</text>

    <!-- Divider -->
    <line x1="400" y1="358" x2="480" y2="358" stroke="rgba(255,255,255,0.4)" stroke-width="0.75"/>

    <!-- Tagline -->
    <text x="400" y="410"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="32"
          font-weight="300"
          fill="rgba(245, 245, 245, 0.85)"
          letter-spacing="-0.5">Software, Apps &amp; SaaS</text>

    <!-- Sub-tagline -->
    <text x="400" y="450"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="20"
          font-weight="300"
          fill="rgba(163, 163, 163, 0.9)"
          letter-spacing="-0.2">Engineered for every screen.</text>

    <!-- URL -->
    <text x="400" y="540"
          font-family="'Consolas', 'JetBrains Mono', monospace"
          font-size="16"
          font-weight="500"
          letter-spacing="2"
          fill="rgba(163, 163, 163, 0.7)">thereichmannco.co.za</text>
</svg>

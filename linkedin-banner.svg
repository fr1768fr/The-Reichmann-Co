<svg xmlns="http://www.w3.org/2000/svg" width="1128" height="191" viewBox="0 0 1128 191">
    <defs>
        <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
            <stop offset="0%" stop-color="#0a0a0a"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        <linearGradient id="accentline" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="rgba(59, 130, 246, 0)"/>
            <stop offset="50%" stop-color="rgba(59, 130, 246, 0.7)"/>
            <stop offset="100%" stop-color="rgba(59, 130, 246, 0)"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1128" height="191" fill="url(#vignette)"/>

    <!-- Hairline frame -->
    <rect x="20" y="20" width="1088" height="151" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

    <!-- Centered content block -->
    <g transform="translate(564, 96)">
        <!-- Eyebrow: single short blue line above the wordmark -->
        <line x1="-30" y1="-46" x2="30" y2="-46" stroke="rgba(59, 130, 246, 0.95)" stroke-width="1"/>
        <text x="0" y="-30"
              text-anchor="middle"
              font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
              font-size="11"
              font-weight="500"
              letter-spacing="5"
              fill="rgba(59, 130, 246, 0.95)">ESTABLISHED 2026</text>

        <!-- Wordmark -->
        <text x="0" y="10"
              text-anchor="middle"
              font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
              font-size="44"
              font-weight="700"
              fill="#f5f5f5"
              letter-spacing="-1">The Reichmann Co.</text>

        <!-- Tagline -->
        <text x="0" y="42"
              text-anchor="middle"
              font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
              font-size="13"
              font-weight="400"
              letter-spacing="3.5"
              fill="rgba(170, 170, 170, 0.95)">SOFTWARE · APPS · SAAS</text>
    </g>

    <!-- Bottom accent line (decorative) -->
    <line x1="280" y1="171" x2="848" y2="171" stroke="url(#accentline)" stroke-width="1"/>

    <!-- URL (bottom-right) -->
    <text x="1088" y="166"
          text-anchor="end"
          font-family="Consolas, monospace"
          font-size="12"
          font-weight="500"
          letter-spacing="1.5"
          fill="rgba(163, 163, 163, 0.65)">thereichmannco.co.za</text>
</svg>

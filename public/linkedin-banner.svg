<svg xmlns="http://www.w3.org/2000/svg" width="1128" height="191" viewBox="0 0 1128 191">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0a2540"/>
            <stop offset="100%" stop-color="#051026"/>
        </linearGradient>
        <radialGradient id="glow" cx="22%" cy="100%" r="65%">
            <stop offset="0%" stop-color="rgba(74, 125, 255, 0.22)"/>
            <stop offset="100%" stop-color="rgba(74, 125, 255, 0)"/>
        </radialGradient>
        <linearGradient id="accentline" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="rgba(96, 165, 250, 0)"/>
            <stop offset="50%" stop-color="rgba(96, 165, 250, 0.75)"/>
            <stop offset="100%" stop-color="rgba(96, 165, 250, 0)"/>
        </linearGradient>
        <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
        </pattern>
    </defs>

    <!-- Background: deep navy gradient + subtle dot grid + soft brand glow -->
    <rect width="1128" height="191" fill="url(#bg)"/>
    <rect width="1128" height="191" fill="url(#dotgrid)"/>
    <rect width="1128" height="191" fill="url(#glow)"/>

    <!-- Hairline frame -->
    <rect x="20" y="20" width="1088" height="151" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

    <!-- Centred content block -->
    <g transform="translate(564, 96)">
        <!-- Eyebrow: short blue accent line above the wordmark -->
        <line x1="-44" y1="-46" x2="44" y2="-46" stroke="rgba(96, 165, 250, 0.95)" stroke-width="1"/>
        <text x="0" y="-30"
              text-anchor="middle"
              font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
              font-size="11"
              font-weight="500"
              letter-spacing="5"
              fill="rgba(96, 165, 250, 0.95)">ESTABLISHED 2026 &#183; SOUTH AFRICA</text>

        <!-- Wordmark -->
        <text x="0" y="10"
              text-anchor="middle"
              font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
              font-size="44"
              font-weight="700"
              fill="#ffffff"
              letter-spacing="-1">The Reichmann Co.</text>

        <!-- Tagline -->
        <text x="0" y="42"
              text-anchor="middle"
              font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
              font-size="13"
              font-weight="400"
              letter-spacing="3.5"
              fill="rgba(203, 213, 225, 0.95)">SOFTWARE FOR SOUTH AFRICAN BUSINESS</text>
    </g>

    <!-- Bottom accent line (decorative) -->
    <line x1="280" y1="171" x2="848" y2="171" stroke="url(#accentline)" stroke-width="1"/>

    <!-- URL (bottom-right) -->
    <text x="1088" y="166"
          text-anchor="end"
          font-family="Consolas, monospace"
          font-size="12"
          font-weight="500"
          letter-spacing="1.5"
          fill="rgba(148, 163, 184, 0.7)">thereichmannco.co.za</text>
</svg>
